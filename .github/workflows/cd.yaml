# name: Bloggy CD

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      IMAGE_NAME: mibitstech/blog-app
      IMAGE_TAG: build-${{github.sha}}

    steps:
      - name: Chechout the source code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Update the compose file
        uses: fjogeleit/yaml-update-action@v0.16.1
        with:
          valueFile: compose.yaml
          propertyPath: 'services["blog-server"].image'
          value: ${{ env.IMAGE_NAME}}:${{ env.IMAGE_TAG}}
          commitChange: false

      - name: Generate token
        id: generate_token
        uses: tibdex/github-app-token@v1
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_SECRET_KEY }}

      - name: Commit files
        run: |
          git config --local user.name "github-actions"
          git config --local user.email "github-actions@github.com"
          git add .
          git commit -m "Bump the image version ${{ env.IMAGE_TAG}} [skip ci]"

      - name: Push the changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ steps.generate_token.outputs.token }}

      - name: Build the docker image
        run: docker build --no-cache -t ${{ env.IMAGE_NAME}}:${{ env.IMAGE_TAG}} --platform linux/amd64 .

      - name: Login into docker hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push the docker image
        run: docker push ${{ env.IMAGE_NAME}}:${{ env.IMAGE_TAG}}

  deploy:
    name: Deploy the image to docker swarm cluster
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: mibitstech/blog-app
      IMAGE_TAG: build-${{github.sha}}
    needs:
      - build-and-push
    steps:
      - name: SSH into the server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{secrets.SWARM_MANAGER_HOST }}
          username: ${{secrets.SWARM_HOST_USERNAME }}
          key: ${{secrets.SWARM_HOST_SSH_KEY }}
          port: ${{secrets.SWARM_HOST_SSH_PORT }}
          script: |
            set -e
            cd ~/bloggy

            # Pull compose file using git
            git fetch origin main
            git checkout origin/main 

            # Pull the new image
            sudo docker pull ${{ env.IMAGE_NAME}}:${{ env.IMAGE_TAG}}
            sudo docker stack deploy -c compose.yaml bloggy
